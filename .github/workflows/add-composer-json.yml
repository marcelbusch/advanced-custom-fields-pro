name: Add composer.json to releases

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to process (e.g. v6.8.0.1)'
        required: true

jobs:
  add-composer-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Clone and checkout tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          git checkout "${TAG}"

      - name: Check if composer.json already exists
        id: check
        run: |
          if [ -f composer.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create composer.json and update tag
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Strip leading v for version string
          VERSION="${TAG#v}"

          cat > composer.json << EOF
          {
            "name": "marcelbusch/advanced-custom-fields-pro",
            "description": "Advanced Custom Fields PRO",
            "version": "${VERSION}",
            "type": "wordpress-plugin",
            "license": "GPL-2.0-or-later",
            "require": {
              "php": ">=7.4",
              "composer/installers": "^1.0 || ^2.0"
            }
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.json
          git commit -m "Add composer.json for ${TAG}"
          git tag -d "${TAG}"
          git tag "${TAG}"
          git push origin "${TAG}" --force
