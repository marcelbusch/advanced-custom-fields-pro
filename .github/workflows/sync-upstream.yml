name: Sync upstream tags

on:
  schedule:
    # Check for new upstream tags weekly on Monday at 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/pronamic/advanced-custom-fields-pro.git || true
          git fetch upstream --tags

      - name: Push new tags
        run: |
          # Get tags that exist in upstream but not in origin
          UPSTREAM_TAGS=$(git tag -l --sort=-v:refname)
          git fetch origin --tags
          ORIGIN_TAGS=$(git tag -l --sort=-v:refname)

          for tag in $(git ls-remote --tags upstream | grep -oP 'refs/tags/\K[^\^]+$' | sort -V); do
            upstream_commit=$(git ls-remote --tags upstream | grep "refs/tags/${tag}$" | awk '{print $1}')
            origin_commit=$(git ls-remote --tags origin | grep "refs/tags/${tag}$" | awk '{print $1}')
            if [ -z "$origin_commit" ]; then
              echo "New tag found: ${tag}"
              git push origin "refs/tags/${tag}:refs/tags/${tag}"
            elif [ "$upstream_commit" != "$origin_commit" ]; then
              echo "Tag ${tag} exists with different commit on origin; skipping to avoid clobbering."
            fi
          done
